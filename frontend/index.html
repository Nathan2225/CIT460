<!DOCTYPE html>
<html>
<head>
    <title>Rust WebSocket Chat</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="app">

    <!-- side bar -->
    <!-- Server Sidebar -->
    <div id="serverSidebar" style="display:none;">
        <ul id="serverList"></ul>

        <div id="serverControls">
            <input id="serverNameInput" placeholder="Server name">
            <button onclick="createServer()">+</button>

            <input id="serverCodeInput" placeholder="Join code">
            <button onclick="joinServer()">➜</button>
        </div>
    </div>

    <!-- Channel Sidebar -->
    <div id="sidebar" style="display:none;">
       <h3>Channels</h3>
    <ul id="roomList"></ul>

        <div id="createRoomSection">
            <input id="roomInput" placeholder="New channel name">
            <button onclick="joinRoom()">✔</button>
        </div>
    </div>

    <!-- Main Chat -->
    <div id="main">

        <header>
            <div class="left">
                <h2 id="currentServer"> </h2>
                <div id="roomInfo">
                    <b id="currentRoom"> </b><br>
                    <span id="currentServerCode"> </span>
                </div>
            </div>
            <div id="currentUser"></div>
            <button id="logoutBtn" onclick="logout()">Logout</button>
        </header>

        <!-- username -->
        <div id="authSection">

            <h1>Welcome to Thiscord Chat!</h1>

            <h2>Login</h2>
            <input id="loginUsername" placeholder="Username">
            <input id="loginPassword" type="password" placeholder="Password">
            <button onclick="login()">Login</button>

            <hr>

            <h2>Sign Up</h2>
            <input id="signupUsername" placeholder="Username">
            <input id="signupEmail" placeholder="Email">
            <input id="signupPassword" type="password" placeholder="Password">
            <button onclick="signup()">Sign Up</button>

        </div>

        <div id="chatContainer">

            <ul id="messages"></ul>

            <!-- message bar -->
            <div id="chatSection" style="display:none;">
                <input id="msg" placeholder="Type message">
                <button onclick="sendMessage()">Send</button>
            </div>

        </div>


    </div>

    <div id="memberSidebar">
        <h3>Members</h3>
        <ul id="memberList"></ul>
    </div>

</div>

<script src="chat.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Rust WebSocket Chat</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="app">

    <!-- side bar -->
    <!-- Server Sidebar -->
    <div id="serverSidebar">
        <ul id="serverList">
            <li class="server active">M</li>
        </ul>
    </div>

    <!-- Channel Sidebar -->
    <div id="sidebar">
       <h3>Channels</h3>
    <ul id="roomList"></ul>

        <div id="createRoomSection">
            <input id="roomInput" placeholder="New channel name">
            <button onclick="joinRoom()">Create</button>
        </div>
    </div>

    <!-- Main Chat -->
    <div id="main">

        <header>
            <h2>Main Server</h2>
            <div id="roomInfo">channel: <b id="currentRoom">general</b></div>
        </header>

        <!-- username -->
        <div id="usernameSection">
            <input id="usernameInput" placeholder="Enter username">
            <button onclick="setUsername()">Join Chat</button>
        </div>

        <div id="chatContainer">

            <ul id="messages"></ul>

            <!-- message bar -->
            <div id="chatSection">
                <input id="msg" placeholder="Type message">
                <button onclick="sendMessage()">Send</button>
            </div>

        </div>

    </div>

</div>

<script src="chat.js"></script>

</body>
</html>
